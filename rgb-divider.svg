<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1200 20"
     width="1200"
     height="20">

<defs>

    <!-- Nebula Moving Gradient -->
    <linearGradient id="nebulaGradient"
        x1="0%"
        y1="0%"
        x2="100%"
        y2="0%">

        <stop offset="0%"
              stop-color="#6A00FF"/>

        <stop offset="25%"
              stop-color="#00D9FF"/>

        <stop offset="50%"
              stop-color="#FF00C8"/>

        <stop offset="75%"
              stop-color="#7B2CFF"/>

        <stop offset="100%"
              stop-color="#00FFE5"/>


        <animateTransform
            attributeName="gradientTransform"
            type="translate"
            values="-1 0;1 0;-1 0"
            dur="18s"
            repeatCount="indefinite"/>

    </linearGradient>


    <!-- Deep Space Glow -->
    <filter id="nebulaGlow"
        x="-50%"
        y="-400%"
        width="200%"
        height="900%">

        <feGaussianBlur
            stdDeviation="3"
            result="blur1"/>

        <feGaussianBlur
            stdDeviation="8"
            result="blur2"/>

        <feMerge>

            <feMergeNode in="blur2"/>
            <feMergeNode in="blur1"/>
            <feMergeNode in="SourceGraphic"/>

        </feMerge>

    </filter>


</defs>


<!-- Soft Nebula Aura -->
<rect
    x="0"
    y="8"
    width="1200"
    height="4"
    rx="5"
    fill="url(#nebulaGradient)"
    opacity="0.45"
    filter="url(#nebulaGlow)"/>


<!-- Main Nebula Line -->
<rect
    x="0"
    y="9"
    width="1200"
    height="2"
    rx="3"
    fill="url(#nebulaGradient)"
    filter="url(#nebulaGlow)">

    <animate
        attributeName="opacity"
        values="0.6;1;0.6"
        dur="6s"
        repeatCount="indefinite"/>

</rect>


</svg>
