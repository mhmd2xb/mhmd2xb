<svg width="100%" height="30" viewBox="0 0 1200 30" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="rgb" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff004c">
        <animate attributeName="stop-color"
                 values="#ff004c;#00e5ff;#7cff00;#ff004c"
                 dur="5s"
                 repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#00e5ff">
        <animate attributeName="stop-color"
                 values="#00e5ff;#7cff00;#ff004c;#00e5ff"
                 dur="5s"
                 repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#7cff00">
        <animate attributeName="stop-color"
                 values="#7cff00;#ff004c;#00e5ff;#7cff00"
                 dur="5s"
                 repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <line x1="20" y1="15" x2="1180" y2="15"
        stroke="url(#rgb)"
        stroke-width="4"
        stroke-linecap="round"
        stroke-dasharray="100 30"
        filter="url(#glow)">
    <animate attributeName="stroke-dashoffset"
             from="0" to="-260"
             dur="3s"
             repeatCount="indefinite"/>
  </line>
</svg>
